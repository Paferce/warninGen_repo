<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Test API de Contactos</h1>
    <button onclick="testAPI()">Probar API</button>
    <pre id="resultado"></pre>

    <script>
        async function testAPI() {
            const resultado = document.getElementById('resultado');
            
            try {
                // Primero hacer login
                resultado.textContent = 'Haciendo login...\n';
                
                const loginResponse = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@ejemplo.com',
                        password: 'admin123'
                    })
                });
                
                const loginData = await loginResponse.json();
                resultado.textContent += 'Login: ' + JSON.stringify(loginData, null, 2) + '\n\n';
                
                if (loginData.success && loginData.token) {
                    // Ahora obtener contactos
                    resultado.textContent += 'Obteniendo contactos...\n';
                    
                    const contactosResponse = await fetch('http://localhost:3001/api/contactos', {
                        headers: {
                            'Authorization': `Bearer ${loginData.token}`
                        }
                    });
                    
                    const contactosData = await contactosResponse.json();
                    resultado.textContent += 'Contactos: ' + JSON.stringify(contactosData, null, 2);
                } else {
                    resultado.textContent += 'Error en login';
                }
                
            } catch (error) {
                resultado.textContent += 'ERROR: ' + error.message;
            }
        }
    </script>
</body>
</html>
