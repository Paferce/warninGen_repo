version: '3.8'

services:
  # Base de datos MySQL
  database:
    image: mysql:8.0
    container_name: alertas_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-sistema_alertas}
      MYSQL_USER: ${DB_USER:-alertas_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-alertas_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - alertas_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # Backend Node.js
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: alertas_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: database
      DB_USER: ${DB_USER:-alertas_user}
      DB_PASSWORD: ${DB_PASSWORD:-alertas_password}
      DB_NAME: ${DB_NAME:-sistema_alertas}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      WHATSAPP_CONTENT_SID: ${WHATSAPP_CONTENT_SID}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Sistema de Alertas}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - alertas_network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3001/api/contactos', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React con Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alertas_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - alertas_network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  alertas_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
